<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ASR Time">
<title>ASR Plumbing Time Sheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:Arial,sans-serif;background:#eef0f4;color:#1a2744;padding-bottom:88px}

/* HEADER */
.hdr{background:#1a2744;color:#fff;padding:12px 16px 10px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.hdr-left .co{font-size:9px;letter-spacing:3px;color:#7a9ac4;text-transform:uppercase}
.hdr-left .ti{font-size:20px;font-weight:bold;line-height:1.1}
.hdr-left .nm{font-size:11px;color:#8fb0d8;margin-top:1px}
.saved{font-size:10px;font-weight:bold;color:rgba(255,255,255,.22);letter-spacing:1px;transition:color .4s;margin-top:4px;text-align:right}
.saved.on{color:#4cde7a}

/* WEEK NAV */
.wnav{display:flex;align-items:center;background:rgba(255,255,255,.09);border-radius:9px;padding:6px 8px;gap:6px}
.wnav-btn{flex-shrink:0;width:36px;height:36px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.wnav-mid{flex:1;text-align:center}
.wnav-label{font-size:13px;font-weight:bold;line-height:1.2}
.wnav-back{display:none;font-size:10px;color:#8fb0d8;background:none;border:none;text-decoration:underline;cursor:pointer;margin-top:3px;padding:0;width:100%}

/* TOTALS BAR */
.tbar{background:#253460;color:#fff;display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06)}
.tbar::-webkit-scrollbar{display:none}
.tcell{padding:9px 16px;border-right:1px solid rgba(255,255,255,.1);flex-shrink:0}
.tcell-lbl{font-size:8px;letter-spacing:2px;color:#7a9ac4;text-transform:uppercase;margin-bottom:1px}
.tcell-num{font-size:20px;font-weight:bold;line-height:1}
.tcell-unit{font-size:10px;color:#7a9ac4;margin-left:2px}

/* CALENDAR STRIP */
.cal{margin:10px 12px 0;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.cal-hdr{background:#1a2744;padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
.cal-hdr-lbl{font-size:10px;font-weight:bold;color:#8fb0d8;letter-spacing:1.5px;text-transform:uppercase}
.cal-hint{font-size:10px;color:#4a6080;font-style:italic}
.cal-empty{padding:14px 16px;font-size:13px;color:#bbb;text-align:center}
.cal-ev{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-top:1px solid #f0f0f0}
.cal-ev.done{background:#f6fff6}
.cal-dot{width:34px;height:34px;border-radius:8px;background:#e8eeff;color:#1a2744;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0;letter-spacing:.5px}
.cal-dot.done{background:#d4edda;color:#2e7d32}
.cal-info{flex:1;min-width:0}
.cal-name{font-weight:bold;font-size:13px;color:#1a2744}
.cal-time{font-size:11px;color:#777;margin-top:1px}
.cal-desc{font-size:11px;color:#aaa;margin-top:1px}
.cal-loc{font-size:10px;color:#ccc;margin-top:1px}
.cal-btn{flex-shrink:0;padding:6px 11px;border-radius:7px;font-size:12px;font-weight:bold;border:none;background:#1a2744;color:#fff;cursor:pointer;align-self:center}
.cal-btn.done{background:#d4edda;color:#2e7d32;cursor:default}

/* ENTRY CARDS */
.entries{padding:10px 12px}
.card{background:#fff;border-radius:12px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:2px solid transparent;position:relative;transition:border-color .15s,box-shadow .15s}
.card.open{border-color:#1a2744;box-shadow:0 3px 14px rgba(26,39,68,.16);z-index:5}
.card-top{display:flex;align-items:center;padding:12px 13px;cursor:pointer;gap:10px;user-select:none}
.c-dot{width:36px;height:36px;border-radius:8px;background:#eef0f4;color:#555;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;transition:background .15s,color .15s}
.card.open .c-dot{background:#1a2744;color:#fff}
.c-main{flex:1;min-width:0}
.c-name{font-weight:bold;font-size:14px;color:#1a2744;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-name.empty{color:#ccc;font-weight:normal}
.c-sub{font-size:11px;color:#aaa;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-hrs{text-align:right;flex-shrink:0}
.c-num{font-size:19px;font-weight:bold;color:#ddd;line-height:1}
.c-num.v{color:#1a2744}
.c-lbl{font-size:9px;color:#ccc}
.c-chev{color:#ccc;font-size:15px;flex-shrink:0;transition:transform .15s}
.card.open .c-chev{transform:rotate(180deg)}

/* FORM */
.c-form{display:none;padding:2px 13px 14px;border-top:1px solid #f2f2f2}
.card.open .c-form{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}
.ff{grid-column:1/-1}
.fl{font-size:9px;font-weight:bold;color:#aaa;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.fi{width:100%;border:1.5px solid #e4e6ea;border-radius:9px;padding:10px 12px;font-size:15px;font-family:Arial,sans-serif;outline:none;background:#f8f9fb;-webkit-appearance:none;appearance:none;color:#1a2744}
.fi:focus{border-color:#1a2744}
.loc-row{display:flex;gap:7px}
.loc-btn{flex-shrink:0;width:44px;border-radius:9px;border:1.5px solid #e4e6ea;background:#f8f9fb;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rm-btn{margin-top:12px;width:100%;padding:10px;background:#fff3f3;color:#c0392b;border:1px solid #f5c6c6;border-radius:9px;font-size:13px;font-weight:bold;cursor:pointer}

/* AUTOCOMPLETE */
.acw{position:relative}
.acd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.16);border:1.5px solid #dde1ea;z-index:999;overflow:hidden;max-height:200px;overflow-y:auto;display:none}
.acd.show{display:block}
.aci{padding:12px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid #f2f2f2;display:flex;align-items:center;gap:8px}
.aci:last-child{border-bottom:none}
.aci:active{background:#f0f4ff}
.ac-hi{font-weight:bold;color:#1a2744}

/* FABS */
.fab-row{position:fixed;bottom:24px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:14px;z-index:100;pointer-events:none}
.fab-export{pointer-events:all;background:#fff;color:#1a2744;border:2px solid #1a2744;border-radius:28px;padding:0 18px;height:46px;font-size:13px;font-weight:bold;cursor:pointer;box-shadow:0 4px 14px rgba(26,39,68,.2);display:flex;align-items:center;gap:5px}
.fab-add{pointer-events:all;background:#1a2744;color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:28px;cursor:pointer;box-shadow:0 4px 18px rgba(26,39,68,.5);display:flex;align-items:center;justify-content:center}

/* EXPORT OVERLAY */
.exp-ov{position:fixed;inset:0;z-index:200;background:#fff;display:none;flex-direction:column;overflow-y:auto}
.exp-ov.show{display:flex}
.exp-tb{background:#1a2744;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0}
.exp-tb-title{color:#fff;font-weight:bold;font-size:14px}
.exp-tb-btns{display:flex;gap:8px}
.share-btn{background:#4cde7a;color:#0a2010;border:none;border-radius:7px;padding:9px 16px;font-size:14px;font-weight:bold;cursor:pointer}
.close-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:7px;padding:9px 11px;font-size:14px;font-weight:bold;cursor:pointer}
.exp-hint{background:#f0f4ff;padding:8px 14px;font-size:11px;color:#446;text-align:center;flex-shrink:0}
.exp-body{padding:20px 16px;max-width:700px;margin:0 auto;width:100%}
.exp-hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #1a2744;padding-bottom:12px;margin-bottom:18px}
.exp-co{font-size:9px;letter-spacing:3px;color:#7a9ac4;text-transform:uppercase;margin-bottom:3px}
.exp-ti{font-size:22px;font-weight:bold;line-height:1}
.exp-nm{font-size:11px;color:#999;margin-top:3px}
.exp-wl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:2px;text-align:right}
.exp-wv{font-size:13px;font-weight:bold;text-align:right;margin-top:2px}
.exp-tw{overflow-x:auto;margin-bottom:18px;-webkit-overflow-scrolling:touch}
.exp-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:460px}
.exp-tbl thead tr{background:#1a2744;color:#fff}
.exp-tbl th{padding:8px 9px;text-align:left;font-size:8px;letter-spacing:1.5px;text-transform:uppercase}
.exp-tbl td{padding:7px 9px;border-bottom:1px solid #eee;vertical-align:top}
.exp-tbl tbody tr:nth-child(even){background:#f8f9fb}
.exp-tots{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.exp-tmain{background:#1a2744;color:#fff;border-radius:8px;padding:11px 18px;display:flex;align-items:center;gap:12px}
.exp-tl{font-size:8px;letter-spacing:2px;color:#8fb0d8;text-transform:uppercase}
.exp-tn{font-size:22px;font-weight:bold}
.exp-tbox{background:#f4f6fa;border-left:4px solid #1a2744;border-radius:6px;padding:8px 12px;min-width:80px}
.exp-tbxl{font-size:8px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.exp-tbxh{font-size:16px;font-weight:bold;color:#1a2744}
.exp-tbxu{font-size:10px;color:#aaa;font-weight:normal}
.exp-ft{margin-top:24px;border-top:1px solid #eee;padding-top:10px;font-size:10px;color:#bbb;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-left">
      <div class="co">ASR Plumbing</div>
      <div class="ti">Time Sheet</div>
      <div class="nm">Jordan Steiner</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
    <div id="saved" class="saved">AUTO-SAVE</div>
    <button onclick="toggleTracking()" title="Tap to toggle location tracking" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0">
      <div id="track-dot" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .4s"></div>
      <span style="font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase">Tracking</span>
    </button>
  </div>
  </div>
  <div class="wnav">
    <button class="wnav-btn" onclick="shiftWeek(-1)">‹</button>
    <div class="wnav-mid">
      <div id="wlabel" class="wnav-label"></div>
      <button id="wback" class="wnav-back" onclick="shiftWeek(0)">↩ This week</button>
    </div>
    <button class="wnav-btn" onclick="shiftWeek(1)">›</button>
  </div>
</div>

<!-- TOTALS BAR -->
<div class="tbar" id="tbar"></div>

<!-- CALENDAR -->
<div class="cal">
  <div class="cal-hdr">
    <div class="cal-hdr-lbl">📅 Townsquare Jobs</div>
    <div class="cal-hint">Ask Claude to refresh</div>
  </div>
  <div id="cal-body"></div>
</div>

<!-- ENTRIES -->
<div class="entries" id="entries"></div>

<!-- FABS -->
<div class="fab-row">
  <button class="fab-export" onclick="openExport()">📄 Export</button>
  <button class="fab-add" onclick="addRow()">+</button>
</div>

<!-- EXPORT OVERLAY -->
<div class="exp-ov" id="exp-ov">
  <div class="exp-tb">
    <div class="exp-tb-title">📄 <span id="exp-title"></span></div>
    <div class="exp-tb-btns">
      <button class="share-btn" onclick="doShare()">⬆ Share</button>
      <button class="close-btn" onclick="closeExport()">✕</button>
    </div>
  </div>
  <div class="exp-hint">Tap <strong>⬆ Share</strong> → Mail · Messages · AirDrop</div>
  <div class="exp-body" id="exp-body"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const TYPES = ["Estimate","New Construction","Remodel","Service","Other"];
const AC_KEY = "asr_ac";

// ── CALENDAR SEED (refreshed by Claude each week) ───────────────────────────
const CAL = {
  "2026-04-06": [
    {id:"e1",name:"Dylan Wentz",desc:"Plumbing repair",loc:"6757 Marsh Rd, Plainwell MI",start:"2026-04-06T07:30:00-04:00",end:"2026-04-06T08:30:00-04:00"},
    {id:"e2",name:"Tom Hudson",desc:"Plumbing repairs",loc:"4332 Clay Ave, Wyoming MI",start:"2026-04-07T08:00:00-04:00",end:"2026-04-07T08:30:00-04:00"},
    {id:"e3",name:"Caliber Home Improvement (Jared)",desc:"Basement shower install",loc:"1120 Hertog St, Wyoming MI",start:"2026-04-08T08:00:00-04:00",end:"2026-04-08T16:00:00-04:00"},
  ]
};

// ── STATE ───────────────────────────────────────────────────────────────────
let offset = 0, rows = [], openIdx = null, ac = loadAC(), saveTimer;

// ── WEEK HELPERS ────────────────────────────────────────────────────────────
function monday(off) {
  const n = new Date(), d = n.getDay(), m = new Date(n);
  m.setDate(n.getDate() - (d===0?6:d-1) + off*7); m.setHours(0,0,0,0); return m;
}
function wkey(off) { return monday(off).toISOString().slice(0,10); }
function wlabel(off) {
  const m = monday(off), s = new Date(m); s.setDate(m.getDate()+6);
  const f = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  return `${f(m)} – ${f(s)}`;
}

// ── STORAGE ─────────────────────────────────────────────────────────────────
function loadRows(key) {
  try { const d=localStorage.getItem("asr_ts_"+key); return d?JSON.parse(d):[mkRow()]; } catch { return [mkRow()]; }
}
function saveRows() {
  clearTimeout(saveTimer);
  localStorage.setItem("asr_ts_"+wkey(offset), JSON.stringify(rows));
  const el=document.getElementById("saved"); el.textContent="✓ SAVED"; el.classList.add("on");
  saveTimer=setTimeout(()=>{el.textContent="AUTO-SAVE";el.classList.remove("on");},1500);
}
function loadAC() {
  try { const d=localStorage.getItem(AC_KEY); return d?JSON.parse(d):{c:[],j:[]}; } catch { return {c:[],j:[]}; }
}
function pushAC(field,val) {
  const t=val.trim(); if(!t||t.length<2) return;
  if(!ac[field]) ac[field]=[];
  if(ac[field].some(x=>x.toLowerCase()===t.toLowerCase())) return;
  ac[field]=[...ac[field],t].sort((a,b)=>a.localeCompare(b));
  localStorage.setItem(AC_KEY,JSON.stringify(ac));
}

// ── ROW ─────────────────────────────────────────────────────────────────────
function mkRow(o) { return {day:"",cust:"",desc:"",type:"Service",hrs:"",loc:"",calId:null,t1:"",t2:"",...o}; }
function fh(n) { return n%1===0?String(n):n.toFixed(2); }
function total() { return rows.reduce((s,r)=>s+(parseFloat(r.hrs)||0),0); }
function byType() { return rows.reduce((a,r)=>{ if(r.type&&r.hrs) a[r.type]=(a[r.type]||0)+(parseFloat(r.hrs)||0); return a; },{}); }
function upd(i,k,v) { rows[i][k]=v; saveRows(); refreshCard(i); }

// ── CALENDAR HELPERS ────────────────────────────────────────────────────────
function ft(dt) { if(!dt) return ""; const d=new Date(dt); return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}); }
function fd(dt) { if(!dt) return ""; return new Date(dt).toLocaleDateString("en-US",{weekday:"long"}); }
function fhrs(s,e) { if(!s||!e) return ""; const d=(new Date(e)-new Date(s))/3600000; return d>0?String(d%1===0?d:parseFloat(d.toFixed(2))):""; }
function isAdded(id) { return rows.some(r=>r.calId===id); }
function addCal(ev) {
  rows.push(mkRow({calId:ev.id,day:fd(ev.start),cust:ev.name,desc:ev.desc||"",type:"Service",hrs:fhrs(ev.start,ev.end),loc:ev.loc||""}));
  openIdx=rows.length-1; saveRows(); render();
  setTimeout(()=>{ const c=document.querySelectorAll(".card"); if(c.length) c[c.length-1].scrollIntoView({behavior:"smooth",block:"center"}); },80);
}

// ── WEEK NAV ────────────────────────────────────────────────────────────────
function shiftWeek(dir) {
  if(dir===0) offset=0; else offset+=dir;
  rows=loadRows(wkey(offset)); openIdx=null; render();
}

// ── ADD / REMOVE ────────────────────────────────────────────────────────────
function addRow() {
  rows.push(mkRow()); openIdx=rows.length-1; saveRows(); render();
  setTimeout(()=>{ const c=document.querySelectorAll(".card"); if(c.length) c[c.length-1].scrollIntoView({behavior:"smooth",block:"center"}); },80);
}
function removeRow(i) {
  rows.splice(i,1); if(!rows.length) rows.push(mkRow()); openIdx=null; saveRows(); render();
}
function toggleCard(i) { openIdx=openIdx===i?null:i; render(); }

// ── LOCATION ────────────────────────────────────────────────────────────────
function getLoc(i) {
  const btn=document.getElementById("lb"+i); btn.textContent="⏳";
  const done=v=>{ rows[i].loc=v; saveRows(); const el=document.getElementById("li"+i); if(el) el.value=v; btn.textContent="📍"; };
  const ip=()=>fetch("https://ipapi.co/json/").then(r=>r.json()).then(d=>done(d.city?[d.city,d.region].filter(Boolean).join(", "):"?")).catch(()=>done("?"));
  if(!navigator.geolocation){ip();return;}
  navigator.geolocation.getCurrentPosition(
    p=>fetch(`https://nominatim.openstreetmap.org/reverse?lat=${p.coords.latitude}&lon=${p.coords.longitude}&format=json`).then(r=>r.json()).then(d=>{const a=d.address||{};done([a.house_number,a.road,a.city||a.town||a.village,a.state].filter(Boolean).join(", "));}).catch(()=>done(`${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`)),
    ()=>ip(),{enableHighAccuracy:false,timeout:8000,maximumAge:60000}
  );
}

// ── AUTOCOMPLETE ────────────────────────────────────────────────────────────
function wireAC(inEl,dropEl,field,idx) {
  inEl.addEventListener("input",()=>{
    const v=inEl.value.toLowerCase().trim();
    if(!v){dropEl.classList.remove("show");return;}
    const m=(ac[field]||[]).filter(s=>s.toLowerCase().includes(v)&&s.toLowerCase()!==inEl.value.toLowerCase());
    if(!m.length){dropEl.classList.remove("show");return;}
    const escaped=inEl.value.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    dropEl.innerHTML=m.map(s=>`<div class="aci" onmousedown="pickAC(event,'${s.replace(/'/g,"\\'")}',${idx},'${field}')" ontouchend="pickAC(event,'${s.replace(/'/g,"\\'")}',${idx},'${field}')"><span style="color:#ccc">⏱</span><span>${s.replace(new RegExp("("+escaped+")","gi"),'<span class="ac-hi">$1</span>')}</span></div>`).join("");
    dropEl.classList.add("show");
  });
  inEl.addEventListener("blur",()=>{setTimeout(()=>dropEl.classList.remove("show"),250); if(inEl.value.trim().length>=2) pushAC(field,inEl.value);});
  inEl.addEventListener("focus",()=>inEl.dispatchEvent(new Event("input")));
}
function pickAC(e,val,idx,field) {
  e.preventDefault(); rows[idx][field==="c"?"cust":"desc"]=val; saveRows();
  const el=document.getElementById(field+"i"+idx); if(el) el.value=val;
  document.querySelectorAll(".acd").forEach(d=>d.classList.remove("show"));
  pushAC(field,val); refreshCard(idx);
}

// ── RENDER HELPERS ──────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function refreshCard(i) {
  const r=rows[i];
  const ne=document.getElementById("cn"+i); if(ne){ne.textContent=r.cust||"No customer";ne.className="c-name"+(r.cust?"":" empty");}
  const se=document.getElementById("cs"+i); if(se) se.textContent=[r.desc,r.type].filter(Boolean).join(" · ")||"Tap to fill in";
  const he=document.getElementById("ch"+i); if(he){he.textContent=r.hrs||"0";he.className="c-num"+(r.hrs?" v":"");}
  const de=document.getElementById("cd"+i); if(de) de.textContent=r.day?r.day.slice(0,2).toUpperCase():"—";
  renderTotals();
}

function renderTotals() {
  const tot=total(), bt=byType();
  let h=`<div class="tcell"><div class="tcell-lbl">Total</div><div class="tcell-num">${fh(tot)}<span class="tcell-unit">hrs</span></div></div>`;
  for(const [t,v] of Object.entries(bt)) h+=`<div class="tcell"><div class="tcell-lbl">${t}</div><div class="tcell-num">${fh(v)}<span class="tcell-unit">hrs</span></div></div>`;
  document.getElementById("tbar").innerHTML=h;
}

function renderCal() {
  const evs=CAL[wkey(offset)]||[];
  const el=document.getElementById("cal-body");
  if(!evs.length){el.innerHTML='<div class="cal-empty">No appointments this week</div>';return;}
  el.innerHTML=evs.map(ev=>{
    const added=isAdded(ev.id);
    return `<div class="cal-ev${added?" done":""}" id="cev-${ev.id}">
      <div class="cal-dot${added?" done":""}">${fd(ev.start).slice(0,2).toUpperCase()}</div>
      <div class="cal-info">
        <div class="cal-name">${esc(ev.name)}</div>
        <div class="cal-time">${ft(ev.start)} – ${ft(ev.end)} · ${fd(ev.start)}</div>
        ${ev.desc?`<div class="cal-desc">${esc(ev.desc)}</div>`:""}
        ${ev.loc?`<div class="cal-loc">📍 ${esc(ev.loc)}</div>`:""}
      </div>
      <button class="cal-btn${added?" done":""}" ${added?"":`onclick="addCal(CAL['${wkey(offset)}'].find(e=>e.id==='${ev.id}'))"`}>${added?"✓":"+ Add"}</button>
    </div>`;
  }).join("");
}

function renderEntries() {
  const container = document.getElementById("entries");

  // Sort by Mon-Sun order, unassigned at bottom
  const ordered = rows.map((r,i) => ({r,i})).sort((a,b) => {
    const ai = DAYS.indexOf(a.r.day), bi = DAYS.indexOf(b.r.day);
    if (ai === -1 && bi === -1) return a.i - b.i;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai !== bi ? ai - bi : a.i - b.i;
  });

  let html = "";
  let lastDay = null;

  ordered.forEach(function({r, i}) {
    // Day group header
    if (r.day !== lastDay) {
      lastDay = r.day;
      const dh = rows.filter(function(x){ return x.day === r.day; }).reduce(function(s,x){ return s + (parseFloat(x.hrs)||0); }, 0);
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 4px 4px">'
        + '<div style="font-size:11px;font-weight:bold;color:#7a9ac4;letter-spacing:1.5px;text-transform:uppercase">' + (r.day || "No day assigned") + '</div>'
        + (dh > 0 ? '<div style="font-size:11px;color:#aaa">' + fh(dh) + ' hrs</div>' : '')
        + '</div>';
    }

    const open = openIdx === i;
    const dotText = r.day ? r.day.slice(0,2).toUpperCase() : "—";
    const nameClass = r.cust ? "c-name" : "c-name empty";
    const subText = [r.desc, r.type].filter(Boolean).join(" · ") || "Tap to fill in";
    const hrsClass = r.hrs ? "c-num v" : "c-num";

    html += '<div class="card' + (open ? " open" : "") + '" id="card' + i + '">';
    html += '<div class="card-top" onclick="toggleCard(' + i + ')">';
    html += '<div class="c-dot" id="cd' + i + '">' + dotText + '</div>';
    html += '<div class="c-main">';
    html += '<div class="' + nameClass + '" id="cn' + i + '">' + (r.cust || "No customer") + '</div>';
    html += '<div class="c-sub" id="cs' + i + '">' + subText + '</div>';
    html += '</div>';
    html += '<div class="c-hrs">';
    html += '<div class="' + hrsClass + '" id="ch' + i + '">' + (r.hrs || "0") + '</div>';
    html += '<div class="c-lbl">hrs</div>';
    html += '</div>';
    html += '<div class="c-chev">▾</div>';
    html += '</div>'; // card-top

    if (open) {
      const dayOpts = DAYS.map(function(d){ return '<option' + (r.day===d?" selected":"") + '>' + d + '</option>'; }).join("");
      const typeOpts = TYPES.map(function(t){ return '<option' + (r.type===t?" selected":"") + '>' + t + '</option>'; }).join("");
      html += '<div class="c-form">';
      html += '<div class="fg">';
      // Day
      html += '<div class="ff"><div class="fl">Day</div><select class="fi" onchange="upd(' + i + ',\'day\',this.value)"><option value="">Select day</option>' + dayOpts + '</select></div>';
      // Customer
      html += '<div class="ff"><div class="fl">Customer Name</div><div class="acw"><input id="ci' + i + '" class="fi" value="' + esc(r.cust) + '" placeholder="e.g. Herbrucks" autocomplete="off" autocorrect="off" autocapitalize="words" oninput="upd(' + i + ',\'cust\',this.value)"><div class="acd" id="cd-c-' + i + '"></div></div></div>';
      // Description
      html += '<div class="ff"><div class="fl">Job Description</div><div class="acw"><input id="ji' + i + '" class="fi" value="' + esc(r.desc) + '" placeholder="e.g. Bio Room" autocomplete="off" oninput="upd(' + i + ',\'desc\',this.value)"><div class="acd" id="cd-j-' + i + '"></div></div></div>';
      // Type + Hours
      html += '<div><div class="fl">Job Type</div><select class="fi" onchange="upd(' + i + ',\'type\',this.value)">' + typeOpts + '</select></div>';
      html += '<div><div class="fl">Hours</div><input type="number" min="0" step="0.25" class="fi" value="' + (r.hrs||"") + '" placeholder="0" inputmode="decimal" style="text-align:center" oninput="upd(' + i + ',\'hrs\',this.value)"></div>';
      html += '</div>'; // fg
      html += '<button class="rm-btn" onclick="removeRow(' + i + ')">Remove Entry</button>';
      html += '</div>'; // c-form
    }

    html += '</div>'; // card
  });

  container.innerHTML = html;

  // Wire autocomplete
  rows.forEach(function(_,i) {
    const ci = document.getElementById("ci"+i), cdr = document.getElementById("cd-c-"+i);
    const ji = document.getElementById("ji"+i), jdr = document.getElementById("cd-j-"+i);
    if (ci && cdr) wireAC(ci, cdr, "c", i);
    if (ji && jdr) wireAC(ji, jdr, "j", i);
  });
}

// ── LOCATION TRACKING ────────────────────────────────────────────────────────
let watchId = null;
let dwellStart = null;
let dwellPos = null;
let dwellTimer = null;
let lastNotifAddress = null;
const DWELL_METERS = 120;   // how close you need to stay
const DWELL_MINUTES = 8;    // how long before we prompt (minutes)
const DWELL_MS = DWELL_MINUTES * 60 * 1000;

function distMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const d = await r.json();
    const a = d.address || {};
    return [a.house_number, a.road, a.city||a.town||a.village, a.state].filter(Boolean).join(", ");
  } catch { return null; }
}

function normalizeAddr(s) {
  return String(s||"").toLowerCase().replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim();
}

function findMatchingJob(address) {
  const norm = normalizeAddr(address);
  // Check current timesheet rows
  for (const r of rows) {
    if (!r.loc) continue;
    const rn = normalizeAddr(r.loc);
    // Check if they share enough words (street number + road name)
    const words = norm.split(" ").filter(w => w.length > 2);
    const matches = words.filter(w => rn.includes(w));
    if (matches.length >= 2) return { type:"row", row:r, address:r.loc };
  }
  // Check calendar events
  const evs = CAL[wkey(offset)] || [];
  for (const ev of evs) {
    if (!ev.loc) continue;
    const en = normalizeAddr(ev.loc);
    const words = norm.split(" ").filter(w => w.length > 2);
    const matches = words.filter(w => en.includes(w));
    if (matches.length >= 2) return { type:"cal", ev, address:ev.loc };
  }
  return null;
}

function showDwellBanner(address, elapsed, match) {
  // Don't re-show same address
  if (lastNotifAddress === address) return;
  lastNotifAddress = address;

  const mins = Math.round(elapsed / 60000);
  const existing = document.getElementById("dwell-banner");
  if (existing) existing.remove();

  const banner = document.createElement("div");
  banner.id = "dwell-banner";
  banner.style.cssText = `position:fixed;bottom:90px;left:12px;right:12px;z-index:500;background:#1a2744;color:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 6px 24px rgba(0,0,0,0.4);font-family:Arial,sans-serif;animation:slideUp 0.3s ease`;

  if (match && match.type === "cal") {
    const ev = match.ev;
    banner.innerHTML = `
      <div style="font-size:10px;color:#7a9ac4;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">📍 You've been here ${mins} min</div>
      <div style="font-weight:bold;font-size:15px;margin-bottom:2px">Is this the ${ev.name} job?</div>
      <div style="font-size:12px;color:#8fb0d8;margin-bottom:12px">${ev.loc}</div>
      <div style="display:flex;gap:8px">
        <button onclick="quickAddFromDwell('${ev.id}','${address.replace(/'/g,"\\'")}',${mins})" style="flex:1;background:#4cde7a;color:#0a2010;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer">✓ Yes, add to sheet</button>
        <button onclick="dismissDwell('${address.replace(/'/g,"\\'")}',${mins})" style="background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer">Not a job</button>
        <button onclick="document.getElementById('dwell-banner').remove()" style="background:rgba(255,255,255,.08);color:#8fb0d8;border:none;border-radius:8px;padding:10px 12px;font-size:16px;cursor:pointer">✕</button>
      </div>`;
  } else if (match && match.type === "row") {
    const r = match.row;
    banner.innerHTML = `
      <div style="font-size:10px;color:#7a9ac4;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">📍 Parked here ${mins} min</div>
      <div style="font-weight:bold;font-size:15px;margin-bottom:2px">Looks like the ${r.cust} job</div>
      <div style="font-size:12px;color:#8fb0d8;margin-bottom:12px">${r.loc}</div>
      <div style="display:flex;gap:8px">
        <button onclick="document.getElementById('dwell-banner').remove()" style="flex:1;background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer">Already logged ✓</button>
        <button onclick="document.getElementById('dwell-banner').remove()" style="background:rgba(255,255,255,.08);color:#8fb0d8;border:none;border-radius:8px;padding:10px 12px;font-size:16px;cursor:pointer">✕</button>
      </div>`;
  } else {
    // Unknown address — offer quick add
    banner.innerHTML = `
      <div style="font-size:10px;color:#7a9ac4;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">📍 Parked ${mins} min</div>
      <div style="font-weight:bold;font-size:15px;margin-bottom:2px">Was this a job?</div>
      <div style="font-size:12px;color:#8fb0d8;margin-bottom:12px">${address}</div>
      <div style="display:flex;gap:8px">
        <button onclick="quickAddNewJob('${address.replace(/'/g,"\\'")}',${mins})" style="flex:1;background:#4cde7a;color:#0a2010;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer">+ Add to sheet</button>
        <button onclick="document.getElementById('dwell-banner').remove()" style="background:rgba(255,255,255,.08);color:#8fb0d8;border:none;border-radius:8px;padding:10px 12px;font-size:16px;cursor:pointer">✕</button>
      </div>`;
  }

  // Slide up animation
  const style = document.createElement("style");
  style.textContent = `@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}`;
  if (!document.getElementById("dwell-style")) { style.id="dwell-style"; document.head.appendChild(style); }

  document.body.appendChild(banner);
}

function quickAddFromDwell(calId, address, mins) {
  const evs = CAL[wkey(offset)] || [];
  const ev = evs.find(e => e.id === calId);
  if (ev) {
    addCal(ev);
    // Also patch the hours based on dwell time
    const last = rows[rows.length-1];
    if (last && !last.hrs) {
      const h = parseFloat((mins/60).toFixed(2));
      last.hrs = h % 1 === 0 ? String(h) : String(h);
      saveRows();
    }
  }
  document.getElementById("dwell-banner")?.remove();
  lastNotifAddress = address;
}

function quickAddNewJob(address, mins) {
  const today = new Date().toLocaleDateString("en-US",{weekday:"long"});
  const h = parseFloat((mins/60).toFixed(2));
  rows.push(mkRow({ day:today, loc:address, hrs: h%1===0?String(h):String(h), type:"Service" }));
  openIdx = rows.length-1;
  saveRows(); render();
  document.getElementById("dwell-banner")?.remove();
  lastNotifAddress = address;
  setTimeout(()=>{ const c=document.querySelectorAll(".card"); if(c.length) c[c.length-1].scrollIntoView({behavior:"smooth",block:"center"}); },80);
}

function dismissDwell(address) {
  document.getElementById("dwell-banner")?.remove();
  lastNotifAddress = address;
}

function onPosition(pos) {
  const { latitude: lat, longitude: lon, accuracy } = pos.coords;
  if (accuracy > 200) return; // ignore if too inaccurate

  if (!dwellPos) {
    dwellPos = { lat, lon };
    dwellStart = Date.now();
    return;
  }

  const dist = distMeters(lat, lon, dwellPos.lat, dwellPos.lon);

  if (dist > DWELL_METERS) {
    // Moved — reset dwell
    dwellPos = { lat, lon };
    dwellStart = Date.now();
    lastNotifAddress = null;
    clearTimeout(dwellTimer);
    dwellTimer = null;
  } else {
    // Still parked — check if dwell time met
    const elapsed = Date.now() - dwellStart;
    if (elapsed >= DWELL_MS && !dwellTimer) {
      dwellTimer = setTimeout(async () => {
        const address = await reverseGeocode(dwellPos.lat, dwellPos.lon);
        if (address && address !== lastNotifAddress) {
          const match = findMatchingJob(address);
          showDwellBanner(address, elapsed, match);
        }
        dwellTimer = null;
      }, 0);
    }
  }
}

function startTracking() {
  if (!navigator.geolocation) return;
  if (watchId !== null) return;
  watchId = navigator.geolocation.watchPosition(onPosition, null, {
    enableHighAccuracy: true, maximumAge: 30000, timeout: 15000
  });
  // Update tracking dot
  const dot = document.getElementById("track-dot");
  if (dot) { dot.style.background="#4cde7a"; dot.title="Location tracking on"; }
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  const dot = document.getElementById("track-dot");
  if (dot) { dot.style.background="rgba(255,255,255,.2)"; dot.title="Tap to enable tracking"; }
}

function toggleTracking() {
  if (watchId !== null) stopTracking();
  else startTracking();
}

// ── INIT ────────────────────────────────────────────────────────────────────
rows = loadRows(wkey(0));
render();
// Auto-start tracking
startTracking();
